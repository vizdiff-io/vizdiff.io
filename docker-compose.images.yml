# Run vizdiff from published GHCR release images (vs docker-compose.yml, which builds from source).
#
# Pin a released version:
#   VIZDIFF_VERSION=1.0.0 docker compose -f docker-compose.images.yml pull
#   VIZDIFF_VERSION=1.0.0 docker compose -f docker-compose.images.yml up -d
# Omitting VIZDIFF_VERSION uses :latest (the newest stable release).
#
# Combine with docker-compose.tls.yml for automatic HTTPS (see docs/self-contained-install.md).
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-vizdiff}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    image: ghcr.io/vizdiff-io/vizdiff-api:${VIZDIFF_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PORT: 3001
      # Required session-signing secret; set it in .env (generate with `openssl rand -hex 32`).
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required; generate one with `openssl rand -hex 32` and set it in .env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/vizdiff-io/vizdiff-worker:${VIZDIFF_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      WORKER_HEALTH_PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/vizdiff-io/vizdiff-frontend:${VIZDIFF_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
