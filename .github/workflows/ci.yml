name: vizdiff.io CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_GITHUB_APP_NAME: vizdiff-io
  NEXT_PUBLIC_GITHUB_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
  NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          database: vizdiff_test

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache node_modules and the Yarn 4 project cache (.yarn/cache). We do NOT use
      # setup-node's `cache: "yarn"`: it invokes yarn during the Setup Node.js step, before
      # corepack is enabled, and Node >=25 no longer ships corepack — so it would rely on a
      # runner-global yarn shim that may not exist. Enabling corepack ourselves + caching here
      # is robust regardless of the runner image.
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm install -g corepack && corepack enable && yarn install --immutable

      - run: yarn dedupe --check

      - name: Cache next.js build
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-

      - name: Build projects
        env:
          GIT_HASH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          yarn build:all
          du -hd 1 frontend/.next/static

      # Must run after build so the `shared` package can be imported
      - name: Lint projects
        run: yarn lint:all

      - name: Run tests
        run: yarn test:all

      # Upload frontend build artifact for deployment
      - name: Upload frontend build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/out
          retention-days: 1

  # Build each image for every architecture on a NATIVE runner (no QEMU), push each by digest, then
  # docker-manifest assembles the multi-arch manifest list. amd64 runs on ubuntu-latest, arm64 on the
  # free public-repo ubuntu-24.04-arm runner. Replaces the old single-job QEMU multi-arch build whose
  # emulated arm64 `next build` for the frontend took ~17 min. Image names match deploy/helm +
  # deploy/terragrunt: ghcr.io/vizdiff-io/vizdiff-{api,worker,frontend}.
  docker-build:
    strategy:
      fail-fast: false
      matrix:
        image: [api, worker, frontend]
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
          - image: api
            dockerfile: ./api/Dockerfile
          - image: worker
            dockerfile: ./worker/Dockerfile
          - image: frontend
            dockerfile: ./frontend/Dockerfile
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Node version
        id: node
        run: echo "version=$(cat .nvmrc | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # On main: push by digest only (untagged) so docker-manifest can assemble the tag. On PRs:
      # build for validation without pushing (type=cacheonly also warms the per-arch cache).
      - name: Build ${{ matrix.image }} (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.platform }}
          outputs: ${{ github.ref == 'refs/heads/main' && format('type=image,name=ghcr.io/vizdiff-io/vizdiff-{0},push-by-digest=true,name-canonical=true,push=true', matrix.image) || 'type=cacheonly' }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}
          build-args: |
            NODE_ENV=production
            NODE_VERSION=${{ steps.node.outputs.version }}
            GIT_HASH=${{ github.sha }}

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.image }}-${{ matrix.platform }}"

      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # Assemble the per-arch digests into one multi-arch manifest list per image (no rebuild).
  docker-manifest:
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [api, worker, frontend]
    steps:
      - name: Download ${{ matrix.image }} digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create + push manifest list
        run: |
          IMAGE=ghcr.io/vizdiff-io/vizdiff-${{ matrix.image }}
          REFS=""
          for f in /tmp/digests/*; do REFS="$REFS ${IMAGE}@$(cat "$f")"; done
          # `:edge` = newest main build. `:latest` is owned by release.yml (newest stable release).
          docker buildx imagetools create \
            -t "${IMAGE}:edge" -t "${IMAGE}:${{ github.sha }}" \
            $REFS

      - name: Inspect manifest
        run: docker buildx imagetools inspect ghcr.io/vizdiff-io/vizdiff-${{ matrix.image }}:edge

  # Publish the static frontend to GitHub Pages (served at the vizdiff.io apex via the CNAME below).
  # Replaces the former S3 + CloudFront hosting.
  deploy:
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read # for checkout (the marketing frontend is built in this job)
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      # Build the frontend here (instead of reusing the frontend-build artifact) so the Pages
      # deployment gets the marketing variant: vizdiff.io has no backend, so
      # NEXT_PUBLIC_MARKETING swaps the sign-in CTAs for docs/GitHub links.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm install -g corepack && corepack enable && yarn install --immutable

      - name: Build marketing frontend
        env:
          NEXT_PUBLIC_MARKETING: "true"
          GIT_HASH: ${{ github.sha }}
        run: yarn workspace frontend build

      # Custom domain for this project Pages site (serves at the apex root, no basePath). `.nojekyll`
      # stops GitHub running Jekyll over Next's `_next/` directory.
      - name: Configure Pages domain
        run: |
          echo "vizdiff.io" > frontend/out/CNAME
          touch frontend/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache node_modules and the Yarn 4 project cache (.yarn/cache). We do NOT use
      # setup-node's `cache: "yarn"`: it invokes yarn during the Setup Node.js step, before
      # corepack is enabled, and Node >=25 no longer ships corepack — so it would rely on a
      # runner-global yarn shim that may not exist. Enabling corepack ourselves + caching here
      # is robust regardless of the runner image.
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm install -g corepack && corepack enable && yarn install --immutable

      - name: Build Storybook
        working-directory: frontend
        run: yarn build-storybook

      # - name: Upload Storybook to VizDiff
      #   uses: vizdiff-io/upload-action@v1
      #   with:
      #     project-token: ${{ secrets.VIZDIFF_PROJECT_TOKEN }}
      #     storybook-dir: "./frontend/storybook-static"

      - name: Publish to Chromatic
        working-directory: frontend
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: yarn chromatic --ci --exit-once-uploaded --exit-zero-on-changes --storybook-build-dir=storybook-static
