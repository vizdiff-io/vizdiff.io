name: vizdiff.io CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_GITHUB_APP_NAME: vizdiff-io
  NEXT_PUBLIC_GITHUB_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
  NEXT_PUBLIC_DD_APPLICATION_ID: ${{ vars.NEXT_PUBLIC_DD_APPLICATION_ID }}
  NEXT_PUBLIC_DD_CLIENT_TOKEN: ${{ vars.NEXT_PUBLIC_DD_CLIENT_TOKEN }}
  NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          database: vizdiff_test

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache node_modules and the Yarn 4 project cache (.yarn/cache). We do NOT use
      # setup-node's `cache: "yarn"`: it invokes yarn during the Setup Node.js step, before
      # corepack is enabled, and Node >=25 no longer ships corepack — so it would rely on a
      # runner-global yarn shim that may not exist. Enabling corepack ourselves + caching here
      # is robust regardless of the runner image.
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm install -g corepack && corepack enable && yarn install --immutable

      - run: yarn dedupe --check

      - name: Cache next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-

      - name: Build projects
        env:
          GIT_HASH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          yarn build:all
          du -hd 1 frontend/.next/static

      # Must run after build so the `shared` package can be imported
      - name: Lint projects
        run: yarn lint:all

      - name: Run tests
        run: yarn test:all

      # Upload frontend build artifact for deployment
      - name: Upload frontend build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/out
          retention-days: 1

  # Builds the api and worker images multi-arch (amd64 + arm64) and publishes them to BOTH the
  # private ECR (SaaS production) and the public GHCR (self-host). The frontend image is published
  # to GHCR only (the SaaS serves the frontend as a static artifact via the deploy job). Image names
  # on GHCR match what deploy/helm + deploy/terragrunt expect: ghcr.io/vizdiff-io/vizdiff-{api,worker,frontend}.
  docker-build-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      # Login to ECR (private; SaaS production images)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Login to GHCR (public; self-host images). Only needed when we push (main).
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up environment variables for image tags
      - name: Set up environment variables
        run: |
          echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_BACKEND=vizdiff.io/backend" >> $GITHUB_ENV
          echo "GHCR_IMAGE=ghcr.io/vizdiff-io/vizdiff-api" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          # Single source of truth for the Node version: .nvmrc
          echo "NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')" >> $GITHUB_ENV

      # Set up QEMU for multi-architecture builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: "arm64,amd64"

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # On main: multi-arch (amd64+arm64), pushed to ECR + GHCR. On PRs: single-arch amd64 build for
      # validation only (a multi-arch image can't be `load`ed into the local docker for testing).
      - name: Build and push api Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            NODE_ENV=production
            NODE_VERSION=${{ env.NODE_VERSION }}

  docker-build-worker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      # Login to ECR (private; SaaS production images)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Login to GHCR (public; self-host images). Only needed when we push (main).
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up environment variables for image tags
      - name: Set up environment variables
        run: |
          echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_WORKER=vizdiff.io/worker" >> $GITHUB_ENV
          echo "GHCR_IMAGE=ghcr.io/vizdiff-io/vizdiff-worker" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          # Single source of truth for the Node version: .nvmrc
          echo "NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')" >> $GITHUB_ENV

      # Set up QEMU for multi-architecture builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: "arm64,amd64"

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push worker Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_WORKER }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_WORKER }}:latest
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            NODE_ENV=production
            NODE_VERSION=${{ env.NODE_VERSION }}

  # Frontend image is for self-hosters only (the SaaS serves the static export via the deploy job),
  # so it is published to the public GHCR exclusively — no ECR.
  docker-build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment variables
        run: |
          echo "GHCR_IMAGE=ghcr.io/vizdiff-io/vizdiff-frontend" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: "arm64,amd64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            GIT_HASH=${{ github.sha }}

  deploy:
    needs: [build-and-test, docker-build-api, docker-build-worker]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/out

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Set up environment variables for ECR and image tags
      - name: Set up environment variables
        run: |
          echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_BACKEND=vizdiff.io/backend" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_WORKER=vizdiff.io/worker" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # # Set up SSH for EC2 deployment
