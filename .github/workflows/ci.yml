name: vizdiff.io CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_GITHUB_APP_NAME: vizdiff-io
  NEXT_PUBLIC_GITHUB_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
  NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          database: vizdiff_test

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache node_modules and the Yarn 4 project cache (.yarn/cache). We do NOT use
      # setup-node's `cache: "yarn"`: it invokes yarn during the Setup Node.js step, before
      # corepack is enabled, and Node >=25 no longer ships corepack — so it would rely on a
      # runner-global yarn shim that may not exist. Enabling corepack ourselves + caching here
      # is robust regardless of the runner image.
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm install -g corepack && corepack enable && yarn install --immutable

      - run: yarn dedupe --check

      - name: Cache next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-

      - name: Build projects
        env:
          GIT_HASH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          yarn build:all
          du -hd 1 frontend/.next/static

      # Must run after build so the `shared` package can be imported
      - name: Lint projects
        run: yarn lint:all

      - name: Run tests
        run: yarn test:all

      # Upload frontend build artifact for deployment
      - name: Upload frontend build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/out
          retention-days: 1

  # Builds the api and worker images multi-arch (amd64 + arm64) and publishes them to the public
  # GHCR for self-hosters. Image names match what deploy/helm + deploy/terragrunt expect:
  # ghcr.io/vizdiff-io/vizdiff-{api,worker,frontend}.
  docker-build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      # Login to GHCR (public; self-host images). Only needed when we push (main).
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment variables
        run: |
          echo "GHCR_IMAGE=ghcr.io/vizdiff-io/vizdiff-api" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          # Single source of truth for the Node version: .nvmrc
          echo "NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')" >> $GITHUB_ENV

      # Set up QEMU for multi-architecture builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: "arm64,amd64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # On main: multi-arch (amd64+arm64), pushed to GHCR. On PRs: single-arch amd64 build for
      # validation only (a multi-arch image can't be `load`ed into the local docker for testing).
      - name: Build and push api Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            NODE_ENV=production
            NODE_VERSION=${{ env.NODE_VERSION }}

  docker-build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment variables
        run: |
          echo "GHCR_IMAGE=ghcr.io/vizdiff-io/vizdiff-worker" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: "arm64,amd64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push worker Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            NODE_ENV=production
            NODE_VERSION=${{ env.NODE_VERSION }}

  # Same as the api/worker image jobs above; the frontend image is published to the public GHCR.
  docker-build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment variables
        run: |
          echo "GHCR_IMAGE=ghcr.io/vizdiff-io/vizdiff-frontend" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "NODE_VERSION=$(cat .nvmrc | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: "arm64,amd64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: ${{ github.ref == 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            GIT_HASH=${{ github.sha }}

  # Publish the static frontend to GitHub Pages (served at the vizdiff.io apex via the CNAME below).
  # Replaces the former S3 + CloudFront hosting.
  deploy:
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/out

      # Custom domain for this project Pages site (serves at the apex root, no basePath). `.nojekyll`
      # stops GitHub running Jekyll over Next's `_next/` directory.
      - name: Configure Pages domain
        run: |
          echo "vizdiff.io" > frontend/out/CNAME
          touch frontend/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache node_modules and the Yarn 4 project cache (.yarn/cache). We do NOT use
      # setup-node's `cache: "yarn"`: it invokes yarn during the Setup Node.js step, before
      # corepack is enabled, and Node >=25 no longer ships corepack — so it would rely on a
      # runner-global yarn shim that may not exist. Enabling corepack ourselves + caching here
      # is robust regardless of the runner image.
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm install -g corepack && corepack enable && yarn install --immutable

      - name: Build Storybook
        working-directory: frontend
        run: yarn build-storybook

      # - name: Upload Storybook to VizDiff
      #   uses: vizdiff-io/upload-action@v1
      #   with:
      #     project-token: ${{ secrets.VIZDIFF_PROJECT_TOKEN }}
      #     storybook-dir: "./frontend/storybook-static"

      - name: Publish to Chromatic
        working-directory: frontend
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: yarn chromatic --ci --exit-once-uploaded --exit-zero-on-changes --storybook-build-dir=storybook-static
