name: vizdiff.io CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_GITHUB_APP_NAME: vizdiff-io
  NEXT_PUBLIC_GITHUB_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Setup Postgres
        uses: ikalnytskyi/action-setup-postgres@v4
        with:
          database: vizdiff_test

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: Install dependencies
        run: corepack enable && yarn install --immutable

      - run: yarn dedupe --check

      - name: Cache next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-

      - name: Build projects
        run: yarn build:all

      # Must run after build so the `shared` package can be imported
      - name: Lint projects
        run: yarn lint:all

      - name: Run tests
        run: yarn test:all

      # Upload frontend build artifact for deployment
      - name: Upload frontend build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/out
          retention-days: 1

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Set up environment variables for ECR and image tags
      - name: Set up environment variables
        run: |
          echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_BACKEND=vizdiff.io/backend" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_WORKER=vizdiff.io/worker" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # Set up QEMU for multi-architecture builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: "arm64"

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push api Docker image
      - name: Build and push api Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: linux/arm64
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG }},${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          build-args: |
            NODE_ENV=production

      # Build and push worker Docker image
      - name: Build and push worker Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          platforms: linux/arm64
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_WORKER }}:${{ env.IMAGE_TAG }},${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_WORKER }}:latest
          build-args: |
            NODE_ENV=production

  deploy:
    needs: [build-and-test, docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/out

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      # Set up environment variables for ECR and image tags
      - name: Set up environment variables
        run: |
          echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_BACKEND=vizdiff.io/backend" >> $GITHUB_ENV
          echo "ECR_REPOSITORY_WORKER=vizdiff.io/worker" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # Set up SSH for EC2 deployment
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      # Deploy backend services to EC2
      - name: Deploy backend to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_REPOSITORY_BACKEND: ${{ env.ECR_REPOSITORY_BACKEND }}
          ECR_REPOSITORY_WORKER: ${{ env.ECR_REPOSITORY_WORKER }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail  # Make script fail on any error

          # Create docker-compose.yml file
          cat > docker-compose.yml << EOL
          version: '3'
          services:
            api:
              image: ${ECR_REGISTRY}/${ECR_REPOSITORY_BACKEND}:${IMAGE_TAG}
              restart: always
              ports:
                - "80:80"
              environment:
                - NODE_ENV=production
                - PORT=80
              volumes:
                - ./.env.production:/app/api/.env.production:ro

            worker:
              image: ${ECR_REGISTRY}/${ECR_REPOSITORY_WORKER}:${IMAGE_TAG}
              restart: always
              environment:
                - NODE_ENV=production
              volumes:
                - ./.env.production:/app/worker/.env.production:ro
          EOL

          # Create .env.production file from secrets
          cat > .env.production << EOL
          ${{ secrets.ENV_FILE }}
          EOL

          # Copy docker-compose file and env files to EC2
          scp docker-compose.yml .env.production ${EC2_USER}@${EC2_HOST}:~/app/

          # Execute deployment commands on the EC2 instance with AWS_REGION passed through
          ssh ${EC2_USER}@${EC2_HOST} AWS_REGION=${AWS_REGION} 'bash -s' << 'ENDSSH'
            set -euo pipefail  # Make script fail on any error

            # Install AWS CLI if not present
            if ! command -v aws &> /dev/null; then
              echo "Installing AWS CLI..."
              curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              sudo ./aws/install
              rm -rf aws awscliv2.zip
            fi

            # Configure AWS credentials from instance role
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/)
            CREDENTIALS=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE)
            export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | jq -r '.AccessKeyId')
            export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | jq -r '.SecretAccessKey')
            export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | jq -r '.Token')

            # Login to ECR
            echo "Logging into ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}

            # Pull and run the containers
            cd ~/app
            echo "Pulling latest images..."
            docker compose pull
            if [ $? -ne 0 ]; then
              echo "Failed to pull images"
              exit 1
            fi

            echo "Starting containers..."
            docker compose up -d
            if [ $? -ne 0 ]; then
              echo "Failed to start containers"
              exit 1
            fi

            # Verify containers are running
            echo "Verifying containers..."
            sleep 10
            if ! docker compose ps | grep -q "Up"; then
              echo "Containers failed to start properly"
              docker compose logs
              exit 1
            fi

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -a -f --filter "until=24h"
          ENDSSH

      - name: Deploy frontend
        run: |
          echo "Deploying frontend to S3..."
          aws s3 sync frontend/out s3://vizdiff.io --delete

          echo "Invalidating CloudFront cache..."
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Chromatic

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: Install dependencies
        run: corepack enable && yarn install --immutable

      - name: Build Storybook
        working-directory: frontend
        run: yarn build-storybook

      # - name: Publish to vizdiff.io
      #   working-directory: frontend
      #   env:
      #     # When triggered by a pull_request event, use the PR context.
      #     # Otherwise, fall back to push context.
      #     COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      #     BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
      #     BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
      #     BASE_COMMIT: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'N/A' }}
      #     VIZDIFF_PROJECT_TOKEN: ${{ secrets.VIZDIFF_PROJECT_TOKEN }}
      #   run: yarn cli upload --commit "${{ env.COMMIT_SHA }}" --branch "${{ env.BRANCH_NAME }}" --base-branch "${{ env.BASE_BRANCH }}" --base-commit "${{ env.BASE_COMMIT }}" --storybook-directory "storybook-static"

      - name: Publish to Chromatic
        working-directory: frontend
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: yarn chromatic --ci --exit-once-uploaded --exit-zero-on-changes --storybook-build-dir=storybook-static
