  storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Cache node_modules and the Yarn 4 project cache (.yarn/cache). We do NOT use
      # setup-node's `cache: "yarn"`: it invokes yarn during the Setup Node.js step, before
