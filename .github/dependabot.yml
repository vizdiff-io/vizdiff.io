# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Single npm entry rooted at the workspace root: Dependabot resolves Yarn workspaces
  # from the root yarn.lock, so per-workspace entries (e.g. /api) would bump a workspace
  # package.json without regenerating the lockfile and fail `yarn install --immutable`.
  - package-ecosystem: "npm"
    directory: "/"
    labels:
      - "dependencies"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/api"
    labels:
      - "dependencies"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/frontend"
    labels:
      - "dependencies"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/worker"
    labels:
      - "dependencies"
    schedule:
      interval: "weekly"
