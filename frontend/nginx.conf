# Honor an upstream TLS-terminating proxy's X-Forwarded-Proto when present, falling back to this
# server's own scheme otherwise. Without this, overwriting the header with $scheme (always "http"
# on the internal hop) makes the api see http even when the user is on https behind Caddy/ALB/etc.,
# so the session cookie never gets its Secure flag. This `map` is in the http context (conf.d files
# are included inside http) and feeds the proxy_set_header below.
map $http_x_forwarded_proto $vizdiff_forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  location /api/ {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $vizdiff_forwarded_proto;
  }

  location /api {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $vizdiff_forwarded_proto;
  }

  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }
}
