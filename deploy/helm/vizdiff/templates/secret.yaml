{{/*
Chart-managed Secret consumed by api + worker via envFrom.
Skipped entirely when secrets.create is false (you supply secrets.existingSecret).

Required keys (whether chart-managed or external):
  JWT_SECRET, POSTGRES_PASS, GITLAB_HOSTS
Optional keys:
  OIDC_CLIENT_SECRET, GITLAB_WEBHOOK_SECRET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vizdiff.fullname" . }}-secret
  labels:
    {{- include "vizdiff.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required when secrets.create is true" .Values.secrets.jwtSecret | quote }}

  {{- if eq .Values.auth.provider "oidc" }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}

  # Postgres password: from embedded MinIO-style values or external.
  POSTGRES_PASS: {{ required "postgres.password is required when secrets.create is true" .Values.postgres.password | quote }}

  # GITLAB_HOSTS: JSON array of per-host service-token configs. Rendered from
  # .Values.gitlab.hosts unless an external hostsSecret is referenced (in which
  # case it is NOT included here and must be merged via the external secret).
  {{- if not .Values.gitlab.hostsSecret.name }}
  GITLAB_HOSTS: {{ .Values.gitlab.hosts | default list | toJson | quote }}
  {{- end }}

  {{- if .Values.gitlab.webhookSecret }}
  GITLAB_WEBHOOK_SECRET: {{ .Values.gitlab.webhookSecret | quote }}
  {{- end }}

  {{- if and .Values.s3.minio.enabled }}
  # MinIO standalone credentials double as the app's S3 credentials.
  AWS_ACCESS_KEY_ID: {{ .Values.s3.minio.accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.minio.secretKey | quote }}
  {{- end }}
{{- end }}
