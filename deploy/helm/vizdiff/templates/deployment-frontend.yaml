apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vizdiff.fullname" . }}-frontend
  labels:
    {{- include "vizdiff.componentLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      {{- include "vizdiff.componentSelectorLabels" (dict "ctx" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/frontend-config: {{ include (print $.Template.BasePath "/configmap-frontend.yaml") . | sha256sum }}
        checksum/nginx: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vizdiff.componentSelectorLabels" (dict "ctx" . "component" "frontend") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "vizdiff.image" (dict "ctx" . "svc" "frontend") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            # Runtime config.js read by the SPA (window.__VIZDIFF_CONFIG__).
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
            # nginx server config pointing /api at the in-cluster api Service.
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
      volumes:
        - name: frontend-config
          configMap:
            name: {{ include "vizdiff.fullname" . }}-frontend-config
        - name: nginx-config
          configMap:
            name: {{ include "vizdiff.fullname" . }}-nginx
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
