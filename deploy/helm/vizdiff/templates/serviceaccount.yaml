{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vizdiff.serviceAccountName" . }}
  labels:
    {{- include "vizdiff.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    # IRSA: set eks.amazonaws.com/role-arn here (Terragrunt irsa module wires
    # this automatically) to grant the api/worker pods S3 access without static
    # AWS credentials.
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
