apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vizdiff.fullname" . }}-api
  labels:
    {{- include "vizdiff.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "vizdiff.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when config/secret content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vizdiff.componentLabels" (dict "ctx" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vizdiff.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "vizdiff.image" (dict "ctx" . "svc" "api") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "vizdiff.fullname" . }}-env
            - secretRef:
                name: {{ include "vizdiff.secretName" . }}
            {{- if .Values.gitlab.hostsSecret.name }}
            # External secret supplying GITLAB_HOSTS (and any other extra keys).
            - secretRef:
                name: {{ .Values.gitlab.hostsSecret.name }}
            {{- end }}
          env:
            - name: PORT
              value: {{ .Values.service.api.port | quote }}
          # The api runs TypeORM migrations on boot (migrationsRun:true), so it
          # is the schema owner. Generous startup probe lets migrations finish.
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
