apiVersion: v2
name: vizdiff
description: |
  Self-hosted vizdiff.io — Storybook visual-regression testing.
  Deploys the api (Express), worker (background screenshot/diff processor),
  and frontend (Next.js static export served by nginx). Optionally embeds
  Postgres and MinIO so the chart runs standalone with no external AWS
  dependencies.
type: application

# Chart version. Bump on chart changes independent of the app version.
version: 1.0.1

# The default application version — also the default image tag (see values.yaml image.*.tag, which
# fall back to this). Bump to the release version as a pre-tag step when cutting a release; see
# RELEASING.md. Must correspond to published ghcr.io/vizdiff-io/vizdiff-*:<appVersion> images.
appVersion: "1.0.1"

home: https://vizdiff.io
sources:
  - https://github.com/vizdiff-io/vizdiff.io
maintainers:
  - name: Metaverse Industries
    url: https://vizdiff.io
keywords:
  - visual-regression
  - storybook
  - screenshots
  - gitlab
